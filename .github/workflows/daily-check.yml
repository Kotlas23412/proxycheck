      - name: Commit and push configs/available, configs/available(top100), configs/ru, configs/ru(top100)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p configs
          python tools/encode_configs_base64.py \
            configs/available \
            "configs/available(top100)" \
            configs/ru \
            "configs/ru(top100)"
          for f in configs/available "configs/available(top100)" configs/ru "configs/ru(top100)"; do
            [ -f "$f" ] && git add "configs/base64/$(basename "$f")"
          done
          if [ -f "configs/available" ]; then git add configs/available; fi
          if [ -f "configs/available(top100)" ]; then git add "configs/available(top100)"; fi
          if [ -f "configs/ru" ]; then git add configs/ru; fi
          if [ -f "configs/ru(top100)" ]; then git add "configs/ru(top100)"; fi
          if ! git diff --cached --quiet; then
            NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            C=$(wc -l < "configs/available" 2>/dev/null || echo "0")
            C100=$(wc -l < "configs/available(top100)" 2>/dev/null || echo "0")
            CRU=$(wc -l < "configs/ru" 2>/dev/null || echo "0")
            CRU100=$(wc -l < "configs/ru(top100)" 2>/dev/null || echo "0")
            OLD=$(cat configs/last-updated.json 2>/dev/null || echo '{}')
            echo "$OLD" | jq -c --arg t "$NOW" --argjson c "$C" --argjson c100 "$C100" --argjson cru "$CRU" --argjson cru100 "$CRU100" '.["configs/available"] = {updated: $t, count: $c} | .["configs/available(top100)"] = {updated: $t, count: $c100} | .["configs/ru"] = {updated: $t, count: $cru} | .["configs/ru(top100)"] = {updated: $t, count: $cru100}' > configs/last-updated.json
            git add configs/last-updated.json
          fi
          if ! git diff --cached --quiet; then
            git commit -m "update available [check + speedtest, automated]"
            git stash -u
            git pull --rebase origin "${{ github.ref_name }}" || REBASE_FAILED=1
            if [ -n "${REBASE_FAILED:-}" ]; then
              if git diff --name-only --diff-filter=U | grep -q "configs/last-updated.json"; then
                git checkout --theirs configs/last-updated.json
                git add configs/last-updated.json
                GIT_EDITOR=true git rebase --continue
              fi
              if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                echo "::error::Rebase had conflicts that could not be auto-resolved"
                git rebase --abort
                exit 1
              fi
            fi
            git stash pop || true
            git status
            if git log origin/"${{ github.ref_name }}"..HEAD -1 --oneline >/dev/null 2>&1; then
              git push
            fi
          else
            echo "configs/available and top100 unchanged, skip push"
          fi

